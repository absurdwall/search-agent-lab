name: Validate learner checkpoint

on:
  issues:
    types:
      - opened
      - edited
      - reopened

permissions:
  contents: read
  issues: write

concurrency:
  group: checkpoint-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the validator
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Validate issue fields as untrusted data
        env:
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_LABELS: ${{ toJson(github.event.issue.labels.*.name) }}
        run: |
          python -m search_agent_lab.checkpoints.cli validate-issue \
            --username "$ISSUE_AUTHOR" \
            --body-env ISSUE_BODY \
            --title-env ISSUE_TITLE \
            --labels-env ISSUE_LABELS \
            --output "$RUNNER_TEMP/checkpoint-result.json"

      - name: Apply labels, update status comment, and set state
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
        env:
          RESULT_PATH: ${{ runner.temp }}/checkpoint-result.json
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const fs = require('fs');
            const result = JSON.parse(
              fs.readFileSync(process.env.RESULT_PATH, 'utf8')
            );

            if (!result.applicable) {
              core.info('Issue is not a learner checkpoint submission.');
              return;
            }

            const labelDefinitions = [
              {
                name: 'checkpoint',
                color: '5319e7',
                description: 'Optional public learner checkpoint'
              },
              {
                name: 'passed',
                color: '0e8a16',
                description: 'Checkpoint passed'
              },
              {
                name: 'needs-fix',
                color: 'd93f0b',
                description: 'Checkpoint needs an edit'
              }
            ];

            if (result.checkpoint_label) {
              labelDefinitions.push({
                name: result.checkpoint_label,
                color: '1d76db',
                description: 'Checkpoint-specific learner milestone'
              });
            }

            for (const definition of labelDefinitions) {
              try {
                await github.rest.issues.getLabel({
                  ...context.repo,
                  name: definition.name
                });
              } catch (error) {
                if (error.status !== 404) throw error;
                try {
                  await github.rest.issues.createLabel({
                    ...context.repo,
                    ...definition
                  });
                } catch (createError) {
                  if (createError.status !== 422) throw createError;
                }
              }
            }

            const statusLabel = result.valid ? 'passed' : 'needs-fix';
            const oppositeLabel = result.valid ? 'needs-fix' : 'passed';

            try {
              await github.rest.issues.removeLabel({
                ...context.repo,
                issue_number: context.issue.number,
                name: oppositeLabel
              });
            } catch (error) {
              if (error.status !== 404) throw error;
            }

            const labels = ['checkpoint', statusLabel];
            if (result.checkpoint_label) {
              labels.push(result.checkpoint_label);
            }
            await github.rest.issues.addLabels({
              ...context.repo,
              issue_number: context.issue.number,
              labels
            });

            const comments = await github.paginate(
              github.rest.issues.listComments,
              {
                ...context.repo,
                issue_number: context.issue.number,
                per_page: 100
              }
            );
            const statusComment = comments.find((comment) =>
              comment.user?.login === 'github-actions[bot]' &&
              comment.body?.includes(result.comment_marker)
            );

            if (statusComment) {
              await github.rest.issues.updateComment({
                ...context.repo,
                comment_id: statusComment.id,
                body: result.comment
              });
            } else {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: context.issue.number,
                body: result.comment
              });
            }

            await github.rest.issues.update({
              ...context.repo,
              issue_number: context.issue.number,
              state: result.valid ? 'closed' : 'open',
              ...(result.valid ? {state_reason: 'completed'} : {})
            });
