name: Learner checkpoint
description: Share an optional public learner achievement.
title: "[Checkpoint] "
labels:
  - checkpoint
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## Optional public celebration

        This is an honor-system engagement mechanism, not authentication or
        formal grading. The issue, your GitHub username, and your generated
        codename will be public.

        Use the notebook-generated link so the checkpoint fields are prefilled.
        Do not include API keys, .env contents, private traces, raw model
        responses, or other sensitive runtime data.

  - type: input
    id: checkpoint_id
    attributes:
      label: Checkpoint ID
      description: Keep the notebook-prefilled checkpoint ID unchanged.
      placeholder: "week-01:first-tool-found"
    validations:
      required: true

  - type: input
    id: checkpoint
    attributes:
      label: Checkpoint
      description: Keep the notebook-prefilled checkpoint phrase unchanged.
      placeholder: Week 1 — First tool found
    validations:
      required: true

  - type: input
    id: codename
    attributes:
      label: Agent codename
      description: Keep the exact codename generated by the setup notebook.
      placeholder: "🟣 Violet Otter — Agent Pathfinder"
    validations:
      required: true

  - type: checkboxes
    id: honor
    attributes:
      label: Honor-system confirmation
      options:
        - label: I completed the optional live checkpoint and am sharing only the generated public codename.
          required: true
