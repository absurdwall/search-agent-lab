name: Week 1 checkpoint — First tool found
description: Share an optional public Week 1 learner achievement.
title: "[Week 1 checkpoint] First tool found"
labels:
  - week-1-checkpoint
assignees: []
body:
  - type: markdown
    attributes:
      value: |
        ## Optional public celebration

        This is an honor-system engagement mechanism, not authentication or
        formal grading. The issue, your GitHub username, and your generated
        codename will be public.

        Do not include API keys, .env contents, private traces, raw model
        responses, or other sensitive runtime data.

  - type: input
    id: checkpoint
    attributes:
      label: Checkpoint
      description: Keep the prefilled checkpoint phrase unchanged.
      placeholder: Week 1 — First tool found
    validations:
      required: true

  - type: input
    id: codename
    attributes:
      label: Agent codename
      description: Paste the exact codename generated by the setup notebook.
      placeholder: "🟣 Violet Otter — Agent Pathfinder"
    validations:
      required: true

  - type: checkboxes
    id: honor
    attributes:
      label: Honor-system confirmation
      options:
        - label: I completed the optional live checkpoint and am sharing only the generated public codename.
          required: true
